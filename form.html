<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">

                <div class="glass-card card p-4 p-md-5 mb-4">
                    <div class="text-center mb-5">
                        <h1 class="display-4 fw-bold mb-3">🔍 Verità</h1>
                        <p class="lead text-muted">Verifique a veracidade de notícias em segundos</p>
                    </div>
                    
                    <form action="resultado.php" method="post" class="needs-validation" novalidate>
                        <div class="mb-4">
                            <label for="textoNoticia" class="form-label fw-bold">Cole o texto da notícia:</label>
                            <textarea class="form-control" id="textoNoticia" name="textoNoticia" required></textarea>
                            <div class="invalid-feedback">
                                Por favor, insira o texto para análise.
                            </div>
                        </div>
                        
                        <div class="d-grid">

                                <i class="bi bi-search me-2"></i> Verificar Agora
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Botão Modo Escuro -->
    <div class="switch-container">
        <button id="toggleModo" class="btn btn-secondary rounded-circle p-2 shadow">
            <span id="iconeModo"><?= $modoEscuro ? '☀️' : '🌙' ?></span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Validação do Formulário
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
        
        // Controle do Modo Escuro
        document.getElementById('toggleModo').addEventListener('click', function() {
            const html = document.documentElement;
            const icone = document.getElementById('iconeModo');
            const modoEscuro = html.getAttribute('data-bs-theme') === 'dark';
            
            html.setAttribute('data-bs-theme', modoEscuro ? 'light' : 'dark');
            icone.textContent = modoEscuro ? '🌙' : '☀️';
            
            fetch('salvar_modo.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'modoEscuro=' + (!modoEscuro ? '1' : '0')
            });
        });
    </script>
</body>
</html>
